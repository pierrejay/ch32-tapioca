; PlatformIO Project Configuration File
;
; One reference env (`sniffer`, the product) + two single-mode diagnostic builds.
; All capture vocabulary is generic (rle / clocked), never protocol names.
; Old exploration variants / probes were removed (git history keeps them); the
; test_rle_tick bench stays (it characterizes the rle blob's per-level tick period).
;
;   sniffer          - PRODUCT (default): both datapaths + runtime `!mode` switch
;   rle_sniffer      - rle datapath only, with DIAG ([T] telemetry) to re-validate a bus
;   clocked_sniffer  - clocked datapath only, with DIAG ([T] telemetry)
;
;   pio run                              -> builds `sniffer` (default_envs)
;   pio run -e rle_sniffer -t upload     -> rle-only diag build
;   pio run -e clocked_sniffer -t upload -> clocked-only build

[platformio]
default_envs = sniffer

[common]
platform = ch32v
board = genericCH32X035F8U6
framework = noneos-sdk
; Custom linker: caps RAM at 16K, reserving the top 4K (0x20004000) for the PIOC
; program ROM so activating the PIOC can't steal the stack.
board_build.ldscript = ldscript/Link_CH32X035_pioc.ld
; upload_protocol = minichlink  ; WCH USB-SWD probe - UNAVAILABLE here: the PIOC uses the
;                                 SWD pins PC18/PC19, so SWD debug + flashing don't work.
upload_protocol = isp           ; USB bootloader: plug the board in holding BOOT, then upload
base_build_flags =
    -D DEBUG=2   ; (UART path now unused; printf is wrapped to USB-CDC below)
    -Wl,--wrap=_write   ; route printf over USB-CDC (see __wrap__write in main.cpp)
    ; flat #include resolution across the src subdirs (so app code stays unchanged):
    -I src           ; main
    -I src/sniffer   ; rle_sniffer, clocked_sniffer, mode_command, record_framer
    -I src/usb       ; usb_cdc, usb_descriptors
    -I src/hal       ; ch32_sdk, interrupts
    -I src/util      ; ring, cobs, led_blinker, spi_gen
; C++ options applied to project sources only (not the C framework)
build_src_flags =
    -std=gnu++17
    -fno-exceptions
    -fno-rtti
    -fno-threadsafe-statics

; ============================================================================
;  REFERENCE BUILD - the product. Both capture datapaths are instantiated and
;  main() routes service() to the active one; the host flips it with `!mode
;  rle|clocked`. The wire is pure binary: clocked = COBS-0xFF records,
;  rle = raw run-bytes; both share the 0xFF-delimited envelope.
; ============================================================================
[env:sniffer]
extends = common
build_flags =
    ${common.base_build_flags}
    ; ---- mandatory ----
    -D RUN_SNIFFER       ; instantiate BOTH datapaths + the runtime mode selector
    -D RLE_MIN_KBPS=5    ; rle firehose bound: one 0xFF idle boundary after K caps (0 = raw)
    ; ---- optional (uncomment to enable) ----
    ; -D DIAG            ; add the [T] telemetry block to the wire. rle: loopHz/pktHz/drop/
    ;                      ramHi/maxGap/ISR-CPU%; clocked: loopHz/pktHz/usbB/ovf/ramHi. OFF
    ;                      here = clean capture stream; read [T] via scripts/diag_monitor.py.
    ; The rle datapath is always the 30-slot ring30 blob @ TIM3 50 kHz (proven lossless,
    ; see pioc/README.md; data on IO1=PC19), baked into RleSniffer.

; ---- rle datapath only, with DIAG telemetry (re-validate the drain on a new bus) ----
[env:rle_sniffer]
extends = common
build_flags =
    ${common.base_build_flags}
    -D RUN_RLE_SNIFFER   ; rle datapath standalone (no mode switch); raw run-byte stream
    -D RLE_MIN_KBPS=5    ; (the rle path is raw run-bytes 0x00..0x80 + 0xFF/0xFD, no COBS records)
    -D DIAG              ; [T] telemetry: loopHz/pktHz/drop/ramHi for bus re-validation

; ---- clocked datapath only, with DIAG telemetry (re-validate the drain on a new bus) ----
[env:clocked_sniffer]
extends = common
build_flags =
    ${common.base_build_flags}
    -D RUN_CLOCKED_SNIFFER   ; clocked datapath standalone
    -D DIAG                  ; [T] telemetry: loopHz/pktHz/usbB/ovf/ramHi for bus re-validation

; ---- BENCH: measure the rle blob's per-level tick period in exact integer CPU cycles ----
; Holds the capture line at a constant level (drive PA7 -> jumper -> PC19); the REAL rle
; blob free-runs and caps every 128 ticks. cyc/tick = window_cycles / (128 * caps), timed
; off the 48 MHz micros() clock -> lands on the integer (HIGH=9, LOW=8). Prints [RLE-TICK]
; over USB-CDC - any serial terminal, no host script. Rationale + model in rle_tick_test.hpp.
[env:test_rle_tick]
extends = common
build_flags =
    ${common.base_build_flags}
    -D RUN_RLE_TICK_TEST
