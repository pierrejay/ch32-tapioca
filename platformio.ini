; PlatformIO Project Configuration File
;
;   sniffer          - PRODUCT (default): both datapaths + runtime `!mode` switch
;   rle_sniffer      - rle datapath only, with DIAG ([T] telemetry) to re-validate a bus
;   clocked_sniffer  - clocked datapath only, with DIAG ([T] telemetry)
;   mdio_master      - DRIVER: active MDIO master (ASCII !read/!write/!print over CDC; Clause 22)
;   test_rle_tick    - BENCH: measure the rle blob's per-level tick period in exact integer CPU cycles
;                      (cf rle_tick_test.hpp) 
;
;   pio run                              -> builds `sniffer` (default_envs)
;   pio run -e rle_sniffer -t upload     -> rle-only diag build
;   pio run -e clocked_sniffer -t upload -> clocked-only build

[platformio]
default_envs = sniffer

[common]
platform = ch32v
board = genericCH32X035F8U6
framework = noneos-sdk
board_build.ldscript = ldscript/Link_CH32X035_pioc.ld
; upload_protocol = minichlink  ; WCH USB-SWD probe - UNAVAILABLE here: PIOC uses SWD pins
upload_protocol = isp           ; USB bootloader: plug the board in holding BOOT, then upload
base_build_flags =
    -D DEBUG=2          ; (UART path now unused; printf is wrapped to USB-CDC below)
    -Wl,--wrap=_write   ; route printf over USB-CDC (see __wrap__write in main.cpp)
    -I src
    -I src/sniffer
    -I src/mdio
    -I src/usb
    -I src/hal
    -I src/util
build_src_flags =
    -std=gnu++17
    -fno-exceptions
    -fno-rtti
    -fno-threadsafe-statics

; Main "sniffer" firmware
[env:sniffer]
extends = common
build_flags =
    ${common.base_build_flags}
    -D RUN_SNIFFER       ; instantiate BOTH datapaths + the runtime mode selector
    -D RLE_MIN_KBPS=5    ; rle firehose bound: one 0xFF idle boundary after K caps (0 = raw)
    ; -D DIAG            ; add the [T] telemetry block to the wire

[env:rle_sniffer]
extends = common
build_flags =
    ${common.base_build_flags}
    -D RUN_RLE_SNIFFER   ; rle datapath standalone (no mode switch); raw run-byte stream
    -D RLE_MIN_KBPS=5    ; rle firehose bound: one 0xFF idle boundary after K caps (0 = raw)
    -D DIAG              ; [T] telemetry

[env:clocked_sniffer]
extends = common
build_flags =
    ${common.base_build_flags}
    -D RUN_CLOCKED_SNIFFER   ; clocked datapath standalone
    -D DIAG                  ; [T] telemetry

[env:mdio_master]
extends = common
build_flags =
    ${common.base_build_flags}
    -D RUN_MDIO_MASTER   ; active MDIO master driver (ASCII !read/!write/!print; Clause 22)

[env:mdio_master_stub]
extends = common
build_flags =
    ${common.base_build_flags}
    -D RUN_MDIO_MASTER
    -D MDIO_STUB         ; protocol-only build: ASCII layer over USB, no PIOC/dongle

[env:test_rle_tick]
extends = common
build_flags =
    ${common.base_build_flags}
    -D RUN_RLE_TICK_TEST
